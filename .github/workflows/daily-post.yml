name: Daily YouTube post

# Posts to @StickfigureFinance-r8m at 08:00 America/New_York.
# GitHub cron is UTC-only and DST-unaware, so we trigger at both 12:00 and
# 13:00 UTC and let the schedule guard run the job only at the real 08:00 ET.
on:
  schedule:
    - cron: "0 12 * * *"  # 08:00 EDT (Mar-Nov)
    - cron: "0 13 * * *"  # 08:00 EST (Nov-Mar)
  workflow_dispatch:
    inputs:
      force:
        description: "Ignore the 08:00 ET schedule guard"
        type: boolean
        default: false

jobs:
  daily-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Schedule guard (08:00 America/New_York)
        id: guard
        if: ${{ github.event_name == 'schedule' }}
        run: |
          if python -m gary.jobs.schedule --check; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not 08:00 ET yet — skipping."
          fi

      - name: Run daily post
        if: ${{ github.event_name == 'workflow_dispatch' || steps.guard.outputs.run == 'true' }}
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY: ${{ vars.YOUTUBE_PRIVACY || 'private' }}
          GARY_VIDEO_FILE: ${{ vars.GARY_VIDEO_FILE }}
        run: |
          python -m gary.jobs.daily_post --force

      - name: Upload run manifest
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: daily-post-manifest
          path: out/
          if-no-files-found: ignore
